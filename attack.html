<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENA성공 공격덱</title>
<link rel="manifest" href="manifest.json">

<style>
body{
    font-family: Arial, sans-serif;
    background:#1f2430;
    color:white;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
}

.back{
    margin-bottom:20px;
}

.card{
    background:#2b3245;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
    border:1px solid #3c4458;
}

.characters{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}

.character-card{
    background:#343d52;
    border-radius:12px;
    padding:10px;
    text-align:center;
    cursor:pointer;
    transition:0.2s;
}

.character-card:hover{
    transform:scale(1.05);
    border:1px solid #4f7cff;
}

.portrait{
    width:80px;
    height:80px;
    margin:0 auto 10px;
    border-radius:10px;
    overflow:hidden;
}

.selected-card{
    display:flex;
    align-items:center;
    gap:10px;
    border:2px solid #4f7cff;
    border-radius:10px;
    padding:10px;
    margin-bottom:10px;
    background:white;
    color:black;
}
</style>
</head>

<body>

<button class="back" onclick="location.href='index.html'">← 메인으로</button>

<h1>⚔ SENA성공 공격덱</h1>

<div class="card">
<h3>선택된 방어덱</h3>
<div id="selected">선택된 캐릭터 없음</div>
</div>

<div class="card">
<h3>캐릭터 목록</h3>
<div class="characters" id="characterList"></div>
</div>

<div class="card">
<h3>카운터덱 결과</h3>
<div id="result">아직 선택 없음</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB1mVzVlotzO_SOW8EEZkYTdMfXEQ0QxrA",
  authDomain: "sena-success.firebaseapp.com",
  projectId: "sena-success",
  storageBucket: "sena-success.appspot.com",
  messagingSenderId: "467131130722",
  appId: "1:467131130722:web:1c72ca31d052ee55afc23b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let characters = [];
let guides = [];
let selected = [];

/* =========================
   실시간 데이터 (2단계 핵심)
========================= */

function loadCharacters(){
    db.collection("characters")
    .onSnapshot(snap=>{
        characters = snap.docs.map(d=>d.data().name);
        renderCharacters();
    });
}

function loadGuides(){
    db.collection("guides")
    .onSnapshot(snap=>{
        guides = snap.docs.map(d=>d.data());

        // 앱 느낌용 정렬
        guides.sort((a,b)=>
            (a.title||"").localeCompare(b.title||"ko")
        );
    });
}

/* =========================
   캐릭터 렌더
========================= */

function renderCharacters(){
    const box = document.getElementById("characterList");
    box.innerHTML = "";

    characters.forEach(name=>{
        box.innerHTML += `
        <div class="character-card" onclick="selectChar('${name}')">
            <div class="portrait">
                <img src="images/${name}.jpg"
                     style="width:80px;height:80px;object-fit:cover"
                     onerror="this.style.display='none'">
            </div>
            <div>${name}</div>
        </div>`;
    });
}

/* =========================
   선택
========================= */

function selectChar(name){

    if(selected.includes(name)) return;

    if(selected.length >= 3){
        alert("3명까지 선택 가능");
        return;
    }

    selected.push(name);
    renderSelected();

    document.getElementById("result").innerHTML = "검색 중...";

    setTimeout(()=>{
        if(selected.length === 3){
            searchGuide();
        }
    },200);
}

function removeChar(name){
    selected = selected.filter(c=>c!==name);
    renderSelected();
}

function renderSelected(){

    const box = document.getElementById("selected");

    if(selected.length === 0){
        box.innerHTML = "선택된 캐릭터 없음";
        return;
    }

    box.innerHTML = "";

    selected.forEach(name=>{
        box.innerHTML += `
        <div class="selected-card">
            <img src="images/${name}.jpg"
                 style="width:50px;height:50px;border-radius:8px"
                 onerror="this.style.display='none'">
            <span>${name}</span>
            <button onclick="removeChar('${name}')">❌</button>
        </div>`;
    });
}

/* =========================
   검색
========================= */

function searchGuide(){

    const target = [...selected].sort();

    const result = guides.filter(g=>{
        return JSON.stringify([...g.enemy].sort())
        === JSON.stringify(target);
    });

    const box = document.getElementById("result");

    if(result.length === 0){
        box.innerHTML = "등록된 공략 없음";
        return;
    }

    box.innerHTML = "";

    result.forEach(g=>{
        box.innerHTML += `
        <div style="
            background:#4f7cff;
            padding:15px;
            border-radius:12px;
            margin-bottom:10px;
            text-align:center;
            font-weight:bold;
            cursor:pointer;
        " onclick='showGuide(${JSON.stringify(g)})'>
            ⚔ ${g.title}
        </div>`;
    });
}

/* =========================
   상세보기
========================= */

function showGuide(g){

    document.getElementById("result").innerHTML = `
    <div style="background:#2b3245;padding:15px;border-radius:12px">

        <h3>⚔ ${g.title}</h3>

        <h4>스킬</h4>
        ${g.skills.join("<br>")}

        <h4>장비</h4>
        ${g.items.join("<br>")}

        <h4>속공</h4>
        ${g.speed}

        <h4>메모</h4>
        ${g.memo || "없음"}

        <br><br>
        <button onclick="searchGuide()" style="
            width:100%;
            padding:10px;
            background:#4f7cff;
            border:none;
            border-radius:10px;
            color:white;
        ">← 목록</button>

    </div>`;
}

/* =========================
   시작
========================= */

loadCharacters();
loadGuides();

if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
}

</script>
</body>
</html>
