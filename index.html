<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENA성공</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1f2430">

<style>

body{
    font-family:Arial,sans-serif;
    background:#1f2430;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    color:white;
}

.card{
    background:#2b3245;
    padding:35px;
    border-radius:20px;
    width:380px;
    text-align:center;
    border:1px solid #3c4458;
    box-shadow:0 0 25px rgba(0,0,0,0.4);
}

h1{
    margin-top:0;
    margin-bottom:10px;
}

.subtitle{
    color:#bfc7d8;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    box-sizing:border-box;
    border:none;
    border-radius:10px;
    background:#1f2430;
    color:white;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    transition:0.2s;
}

button:hover{
    transform:scale(1.03);
}

.login-btn{
    background:#4f7cff;
    color:white;
}

.attack-btn{
    background:#4f7cff;
    color:white;
}

.defense-btn{
    background:#e67e22;
    color:white;
}

.menu{
    display:none;
}

.admin-btn{
    position:absolute;
    top:15px;
    right:15px;
    width:40px;
    height:40px;
    border:none;
    border-radius:50%;
    background:#3c4458;
    color:white;
    cursor:pointer;
    font-size:18px;
    z-index:9999;
}

.card{
    position:relative;
}

</style>
</head>
<body>

<div class="card">

<button class="admin-btn" onclick="adminLogin()">⚙</button>

    <div id="loginPage">

        <h1>⭐ SENA성공</h1>

        <p class="subtitle">
            세븐나이츠 리버스 길드전 공략 모음
        </p>

        <input
        type="password"
        id="code"
        placeholder="접속 코드 입력">

        <button
        class="login-btn"
        onclick="login()">
            입장
        </button>

    </div>

    <div id="menuPage" class="menu">

        <h1>⭐ SENA성공</h1>

        <p class="subtitle">
            길드전 공략 메뉴
        </p>

        <button
        class="attack-btn"
        onclick="location.href='attack.html'">
            ⚔ 길드전 공격덱
        </button>

        <button
        class="defense-btn"
        onclick="location.href='defense.html'">
            🛡 길드전 방어덱
        </button>

    </div>

</div>

<script>

const ACCESS_CODE = "1234";

function login(){

    const code =
    document.getElementById("code").value;

    if(code === ACCESS_CODE){

        document.getElementById(
            "loginPage"
        ).style.display = "none";

        document.getElementById(
            "menuPage"
        ).style.display = "block";

    }else{

        alert("코드가 틀렸습니다.");

    }

}

function adminLogin(){

    const pw = prompt("관리자 비밀번호");

    if(pw === "1234"){
        location.href = "admin.html";
    }else if(pw !== null){
        alert("비밀번호가 틀렸습니다.");
    }

}

</script>

</body>
</html>
