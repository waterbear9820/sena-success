<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    padding:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    margin-bottom:10px;
}

button{
    padding:10px;
    cursor:pointer;
}

</style>
</head>
<body>

<h1>⚙ 관리자 페이지</h1>

<div class="card">

<h3>캐릭터 추가</h3>

<input
type="text"
id="characterName"
placeholder="캐릭터 이름">

<button onclick="addCharacter()">
캐릭터 추가
</button>
<br><br>

<input
type="file"
id="importCharactersFile">

<button onclick="importCharacters()">
캐릭터 복원
</button>

</div>

<div class="card">

<h3>현재 캐릭터</h3>

<div id="characterList"></div>
<br>

<button onclick="exportCharacters()">
캐릭터 백업
</button>

</div>
<div class="card">

<h3>공략 추가</h3>

<input
type="text"
id="enemy1"
placeholder="상대 캐릭터 1">

<input
type="text"
id="enemy2"
placeholder="상대 캐릭터 2">

<input
type="text"
id="enemy3"
placeholder="상대 캐릭터 3">

<input
type="text"
id="guideTitle"
placeholder="카운터덱 이름">

<input
type="text"
id="guideSkills"
placeholder="스킬순서 (쉼표로 구분)">

<input
type="text"
id="guideItems"
placeholder="장비 (쉼표로 구분)">

<input
type="text"
id="guideSpeed"
placeholder="속공순서">
<textarea
id="guideMemo"
placeholder="공략 메모"
style="
width:100%;
height:120px;
margin-top:10px;
"></textarea>

<button onclick="addGuide()">
공략 저장
</button>

</div>

<div class="card">

<h3>등록된 공략</h3>

<div id="guideList">
공략 없음
</div>

<br>

<button onclick="exportGuides()">
공략 백업
</button>
<br><br>

<input
type="file"
id="importGuidesFile">

<button onclick="importGuides()">
공략 복원
</button>
</div>

<script>

let characters =
JSON.parse(localStorage.getItem("characters"))
|| [];

function renderCharacters(){
    characters.sort((a,b)=>
    a.localeCompare(b,'ko')
);
    const list =
    document.getElementById("characterList");

    list.innerHTML="";

    characters.forEach(name=>{

        list.innerHTML += `
        <div style="
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:8px;
        padding:10px;
        background:#f5f5f5;
        border-radius:8px;
        ">

            <span>${name}</span>

            <button
            onclick="deleteCharacter('${name}')">
            삭제
            </button>

        </div>
        `;

    });

}

function addCharacter(){

    const name =
    document.getElementById("characterName")
    .value.trim();

    if(!name){
        return;
    }
    if(characters.includes(name)){
    alert("이미 존재하는 캐릭터입니다.");
    return;
}

    characters.push(name);

characters.sort((a,b)=>
    a.localeCompare(b,'ko')
);

    localStorage.setItem(
        "characters",
        JSON.stringify(characters)
    );

    document.getElementById(
        "characterName"
    ).value="";

    renderCharacters();

}

function deleteCharacter(name){

    if(!confirm(name + " 삭제할까요?")){
        return;
    }

    characters =
    characters.filter(
        c => c !== name
    );
    characters.sort((a,b)=>
    a.localeCompare(b,'ko')
);

    localStorage.setItem(
        "characters",
        JSON.stringify(characters)
    );

    renderCharacters();

}
function addGuide(){

    let guides =
    JSON.parse(localStorage.getItem("guides"))
    || [];

    const guide = {

        enemy:[
            document.getElementById("enemy1").value.trim(),
            document.getElementById("enemy2").value.trim(),
            document.getElementById("enemy3").value.trim()
        ],

        title:
        document.getElementById("guideTitle").value.trim(),

        skills:
        document.getElementById("guideSkills")
        .value
        .split(","),

        items:
        document.getElementById("guideItems")
        .value
        .split(","),

        speed:
document.getElementById("guideSpeed").value.trim(),

memo:
document.getElementById("guideMemo").value.trim()

    };

   const editIndex =
localStorage.getItem("editGuideIndex");

if(editIndex !== null){

    guides[editIndex] = guide;

    localStorage.removeItem(
        "editGuideIndex"
    );

}else{

    guides.push(guide);

}

    localStorage.setItem(
        "guides",
        JSON.stringify(guides)
    );

    alert("공략 저장 완료!");
    renderGuides();

}
renderCharacters();
function renderGuides(){

    const guides =
    JSON.parse(localStorage.getItem("guides"))
    || [];

    const guideList =
    document.getElementById("guideList");

    if(guides.length === 0){

        guideList.innerHTML =
        "등록된 공략 없음";

        return;
    }

    guideList.innerHTML = "";

    guides.forEach((guide,index)=>{

        guideList.innerHTML += `
        <div style="
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:10px;
        margin-bottom:8px;
        background:#f5f5f5;
        border-radius:8px;
        ">

            <span>${guide.title}</span>

            <button
onclick="editGuide(${index})">
수정
</button>

<button
onclick="deleteGuide(${index})">
삭제
</button>

        </div>
        `;

    });

}

function editGuide(index){

    const guides =
    JSON.parse(localStorage.getItem("guides"))
    || [];

    const guide = guides[index];

    document.getElementById("enemy1").value =
        guide.enemy[0];

    document.getElementById("enemy2").value =
        guide.enemy[1];

    document.getElementById("enemy3").value =
        guide.enemy[2];

    document.getElementById("guideTitle").value =
        guide.title;

    document.getElementById("guideSkills").value =
        guide.skills.join(",");

    document.getElementById("guideItems").value =
        guide.items.join(",");

    document.getElementById("guideSpeed").value =
        guide.speed;
    document.getElementById("guideMemo").value =
    guide.memo || "";    

    localStorage.setItem(
        "editGuideIndex",
        index
    );

}

function importCharacters(){

    const file =
    document.getElementById(
        "importCharactersFile"
    ).files[0];

    if(!file){
        alert("파일을 선택하세요.");
        return;
    }

    const reader =
    new FileReader();

    reader.onload = function(e){

        try{

            const imported =
            JSON.parse(
                e.target.result
            );

            characters = imported;

            localStorage.setItem(
                "characters",
                JSON.stringify(characters)
            );

            renderCharacters();

            alert(
                "캐릭터 복원 완료!"
            );

        }catch{

            alert(
                "올바른 파일이 아닙니다."
            );

        }

    };

    reader.readAsText(file);

}

function exportCharacters(){

    const data =
    JSON.stringify(
        characters,
        null,
        2
    );

    const blob =
    new Blob(
        [data],
        {type:"application/json"}
    );

    const url =
    URL.createObjectURL(blob);

    const a =
    document.createElement("a");

    a.href = url;
    a.download = "characters.json";

    a.click();

    URL.revokeObjectURL(url);

}
 function importGuides(){

    const file =
    document.getElementById(
        "importGuidesFile"
    ).files[0];

    if(!file){
        alert("파일을 선택하세요.");
        return;
    }

    const reader =
    new FileReader();

    reader.onload = function(e){

        try{

            const guides =
            JSON.parse(
                e.target.result
            );

            localStorage.setItem(
                "guides",
                JSON.stringify(guides)
            );

            renderGuides();

            alert(
                "공략 복원 완료!"
            );

        }catch{

            alert(
                "올바른 파일이 아닙니다."
            );

        }

    };

    reader.readAsText(file);

}   

function exportGuides(){

    const guides =
    JSON.parse(localStorage.getItem("guides"))
    || [];

    const data =
    JSON.stringify(
        guides,
        null,
        2
    );

    const blob =
    new Blob(
        [data],
        {type:"application/json"}
    );

    const url =
    URL.createObjectURL(blob);

    const a =
    document.createElement("a");

    a.href = url;
    a.download = "guides.json";

    a.click();

    URL.revokeObjectURL(url);

}
function deleteGuide(index){

    if(!confirm("공략을 삭제할까요?")){
        return;
    }

    let guides =
    JSON.parse(localStorage.getItem("guides"))
    || [];

    guides.splice(index,1);

    localStorage.setItem(
        "guides",
        JSON.stringify(guides)
    );

    renderGuides();

}
renderCharacters();
renderGuides();

</script>

</body>
</html>
