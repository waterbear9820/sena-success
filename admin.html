<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENA성공 관리자</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    padding:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

input, textarea{
    width:100%;
    padding:10px;
    margin-top:10px;
    margin-bottom:10px;
    box-sizing:border-box;
}

button{
    padding:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>⚙ SENA성공 관리자</h1>

<!-- 캐릭터 -->
<div class="card">
<h3>캐릭터 추가</h3>

<input id="characterName" placeholder="캐릭터 이름">


<button onclick="addCharacter()">캐릭터 추가</button>

<h4>현재 캐릭터</h4>
<div id="characterList"></div>
</div>

<!-- 공략 -->
<div class="card">
<h3>공략 추가</h3>

<input id="enemy1" placeholder="상대 1">
<input id="enemy2" placeholder="상대 2">
<input id="enemy3" placeholder="상대 3">

<input id="guideTitle" placeholder="공략 제목">

<input id="guideSkills" placeholder="스킬 (쉼표)">
<input id="guideItems" placeholder="장비 (쉼표)">
<input id="guideSpeed" placeholder="속공">

<textarea id="guideMemo" placeholder="메모"></textarea>

<button id="guideBtn" onclick="addGuide()">공략 저장</button>
</div>

<div class="card">
<h3>공략 목록</h3>
<div id="guideList"></div>
<div class="card">
<h3>방어덱 목록</h3>
<div id="defenseList"></div>
</div>
</div>
<div class="card">

<h3>방어덱 추가</h3>

<input id="defHero1" placeholder="영웅 1">
<input id="defHero2" placeholder="영웅 2">
<input id="defHero3" placeholder="영웅 3">

<input id="defRing" placeholder="추천 반지">

<input id="defFormation" placeholder="추천 진형">

<input id="defPet" placeholder="추천 펫">

<input id="defSkills" placeholder="스킬 순서">

<textarea id="defMemo" placeholder="설명 및 팁"></textarea>

<button onclick="addDefense()">
방어덱 저장
</button>

</div>


<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB1mVzVlotzO_SOW8EEZkYTdMfXEQ0QxrA",
  authDomain: "sena-success.firebaseapp.com",
  projectId: "sena-success",
  storageBucket: "sena-success.appspot.com",
  messagingSenderId: "467131130722",
  appId: "1:467131130722:web:1c72ca31d052ee55afc23b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let editingGuideId = null;

/* =========================
   캐릭터
========================= */

async function addCharacter(){

    const name = document.getElementById("characterName").value.trim();

    if(!name) return;

    await db.collection("characters").add({
        name: name
    });

    alert("캐릭터 추가 완료");

    document.getElementById("characterName").value = "";

    loadCharacters();
}

async function loadCharacters(){

    const snap = await db.collection("characters").get();

    let docs = snap.docs;

    // 🔥 이름 정렬 (개선 2)
    docs.sort((a,b)=>
        a.data().name.localeCompare(b.data().name,'ko')
    );

    let html = "";

    docs.forEach(doc=>{
        const c = doc.data();

        html += `
        <div style="display:flex;align-items:center;justify-content:space-between;margin:5px 0;padding:10px;background:#eee;border-radius:8px;">
            
            <div style="display:flex;align-items:center;gap:10px;">
            
                <span>${c.name}</span>
                <button onclick="deleteCharacter('${doc.id}')">
삭제
</button>
            </div>

        </div>`;
    });

    document.getElementById("characterList").innerHTML = html;
}

async function deleteCharacter(id){

    if(!confirm("캐릭터를 삭제할까요?")) return;

    await db.collection("characters").doc(id).delete();

    alert("캐릭터 삭제 완료");

    loadCharacters();
}
/* =========================
   공략
========================= */

async function addGuide(){

    const guide = {
        enemy:[
            document.getElementById("enemy1").value,
            document.getElementById("enemy2").value,
            document.getElementById("enemy3").value
        ],
        title: document.getElementById("guideTitle").value,
        skills: document.getElementById("guideSkills").value.split(","),
        items: document.getElementById("guideItems").value.split(","),
        speed: document.getElementById("guideSpeed").value,
        memo: document.getElementById("guideMemo").value
    };

    if(editingGuideId){

        await db.collection("guides")
        .doc(editingGuideId)
        .update(guide);

        alert("공략 수정 완료");

        editingGuideId = null;
        document.getElementById("guideBtn").innerText="공략 저장";

    }else{

        await db.collection("guides").add(guide);

        alert("공략 저장 완료");

    }

    document.getElementById("enemy1").value="";
    document.getElementById("enemy2").value="";
    document.getElementById("enemy3").value="";
    document.getElementById("guideTitle").value="";
    document.getElementById("guideSkills").value="";
    document.getElementById("guideItems").value="";
    document.getElementById("guideSpeed").value="";
    document.getElementById("guideMemo").value="";

    loadGuides();
}

async function loadGuides(){

    const snap = await db.collection("guides").get();

    let html = "";

    snap.forEach(doc=>{
        const g = doc.data();

        html += `
<div style="
padding:10px;
background:#eee;
margin-bottom:10px;
border-radius:8px;
">

<b>${g.title}</b><br>
${g.enemy ? g.enemy.join(", ") : "상대 없음"}

<br><br>

<button onclick="editGuide('${doc.id}')">
수정
</button>

<button onclick="deleteGuide('${doc.id}')">
삭제
</button>

</div>
`;
    });

    document.getElementById("guideList").innerHTML = html;
}

/* =========================
   시작
========================= */

let editingDefenseId = null;

async function addDefense(){

    const defense = {

        heroes:[
            document.getElementById("defHero1").value,
            document.getElementById("defHero2").value,
            document.getElementById("defHero3").value
        ],

        ring: document.getElementById("defRing").value,
        formation: document.getElementById("defFormation").value,
        pet: document.getElementById("defPet").value,
        skills: document.getElementById("defSkills").value,
        memo: document.getElementById("defMemo").value
    };

    if(editingDefenseId){

        await db.collection("defenses")
        .doc(editingDefenseId)
        .update(defense);

        alert("방어덱 수정 완료");

        editingDefenseId = null;

    }else{

        await db.collection("defenses").add(defense);

        alert("방어덱 저장 완료");
    }

    document.getElementById("defHero1").value = "";
    document.getElementById("defHero2").value = "";
    document.getElementById("defHero3").value = "";
    document.getElementById("defRing").value = "";
    document.getElementById("defFormation").value = "";
    document.getElementById("defPet").value = "";
    document.getElementById("defSkills").value = "";
    document.getElementById("defMemo").value = "";

    loadDefenses();
}

async function loadDefenses(){

    const snap = await db.collection("defenses").get();

    let html = "";

    snap.forEach(doc=>{

        const d = doc.data();

        html += `
        <div style="
        background:#eee;
        padding:10px;
        margin-bottom:10px;
        border-radius:8px;
        ">

            <b>
            ${(d.heroes || []).join(" / ")}
            </b>

            <br><br>

            <button onclick="editDefense('${doc.id}')">
수정
</button>

<button onclick="deleteDefense('${doc.id}')">
삭제
</button>

        </div>
        `;
    });

    document.getElementById("defenseList").innerHTML = html;
}

async function editGuide(id){

    const doc = await db.collection("guides").doc(id).get();

    const g = doc.data();

    editingGuideId = id;

    document.getElementById("enemy1").value = g.enemy[0] || "";
    document.getElementById("enemy2").value = g.enemy[1] || "";
    document.getElementById("enemy3").value = g.enemy[2] || "";

    document.getElementById("guideTitle").value = g.title || "";
    document.getElementById("guideSkills").value = (g.skills || []).join(",");
    document.getElementById("guideItems").value = (g.items || []).join(",");
    document.getElementById("guideSpeed").value = g.speed || "";
    document.getElementById("guideMemo").value = g.memo || "";

    document.getElementById("guideBtn").innerText="공략 수정 저장";

    window.scrollTo({
        top:0,
        behavior:"smooth"
    });
}

async function deleteGuide(id){

    if(!confirm("공략을 삭제할까요?")) return;

    await db.collection("guides").doc(id).delete();

    alert("공략 삭제 완료");

    loadGuides();
}

async function editDefense(id){

    const doc = await db.collection("defenses").doc(id).get();

    const d = doc.data();

    document.getElementById("defHero1").value = d.heroes?.[0] || "";
    document.getElementById("defHero2").value = d.heroes?.[1] || "";
    document.getElementById("defHero3").value = d.heroes?.[2] || "";

    document.getElementById("defRing").value = d.ring || "";
    document.getElementById("defFormation").value = d.formation || "";
    document.getElementById("defPet").value = d.pet || "";
    document.getElementById("defSkills").value = d.skills || "";
    document.getElementById("defMemo").value = d.memo || "";

    editingDefenseId = id;

    window.scrollTo({
        top:document.body.scrollHeight,
        behavior:"smooth"
    });
}

async function deleteDefense(id){

    if(!confirm("삭제할까요?")) return;

    await db.collection("defenses").doc(id).delete();

    alert("삭제 완료");

    loadDefenses();
}

loadCharacters();
loadGuides();
loadDefenses();

console.log("관리자 페이지 정상 실행");
</script>

</body>
</html>
